apiVersion: apps/v1
kind: Deployment
metadata:
  name: df1
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: df1
  template:
    metadata:
      labels:
        app: df1
    spec:
      containers:
        - name: main
          image: ttl.sh/ceps/df1:v2
          env:
            - name: BROKER_ADDR
              value: ceps-kafka-bootstrap.kafka.svc:9092
            - name: TOPIC
              value: df1-out
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 100Mi
