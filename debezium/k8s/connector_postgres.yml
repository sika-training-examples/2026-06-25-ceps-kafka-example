apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: postgres
  namespace: kafka
  labels:
    # must match the KafkaConnect instance name this connector belongs to
    strimzi.io/cluster: debezium
spec:
  # Debezium PostgreSQL connector class
  class: io.debezium.connector.postgresql.PostgresConnector
  # number of tasks to run in parallel (1 is typical for PostgreSQL CDC)
  tasksMax: 1
  config:
    # PostgreSQL connection details
    database.hostname: postgres.kafka.svc
    database.port: "5432"
    database.user: postgres
    database.password: pg
    database.dbname: example
    # prefix for all Kafka topics produced by this connector (topic = <prefix>.<schema>.<table>)
    topic.prefix: dbz.postgres.example
    # comma-separated list of tables to capture changes from
    table.include.list: public.users,public.pets
    # logical replication plugin; pgoutput is built into PostgreSQL 10+
    plugin.name: pgoutput
